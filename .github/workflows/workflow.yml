name: 🔥 Auto Flutter Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 🔍 Find pubspec.yaml
        id: find_project
        run: |
          echo "Mencari pubspec.yaml..."
          PUBSPEC_PATH=$(find . -type f -name "pubspec.yaml" | head -n 1)
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "❌ pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "✅ Ditemukan di: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: 📦 Flutter Pub Get
        run: flutter pub get
        working-directory: ${{ env.PROJECT_DIR }}

      - name: 🔨 Build APK
        run: flutter build apk --release
        working-directory: ${{ env.PROJECT_DIR }}

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk